<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Var + Console</title>
</head>
<body>
    
    <h1>exemplo Var + Console</h1><!--Titulo-->
    <script>//JavaScript Inline
        var idade = window.prompt("Digite sua idade: ")//window.prompt serve para interagir com usuario
        alert("Idade digitada é:"+ idade);//Mostrar o resultado na console aperte ctrl+j para ver
    </script>

</body>
</html>
