<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 16</title>
</head>
<body>
    <link rel="stylesheet" href="../css/atividade16.css">
<div>
    <form action="#">
    <h1>A soma de dois números</h1>
    <p>Digite os números para calcular:</p>

    <label for="">Digite o primeiro numero</label>
    <input type="number" name="" id="numero1">
    <label for="">Digite o segundo numero</label>
    <input type="number" name="" id="numero2">

    
    <button onclick="somar()">Somar</button>

    <p id="resultado"></p>
    </form>
   </div>
   <script>
        function somar(){
            let numero1 = Number(document.getElementById("numero1").value);
            let numero2 = parseInt (document.getElementById("numero2").value);

            let total = numero1 + numero2;

            document.getElementById("resultado").innerHTML = "O resultado é:"+total;

        }


    </script>
</body>
</html>
