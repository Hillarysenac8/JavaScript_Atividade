<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Let</title>
</head>
<body>

    <h1>Exemplo Let no document</h1>

    <label for="">Digite um número para multiplicar por 2: </label>
    <input type="text" name="" id="numero">

    <button onclick="mult()">multiplicar</button>

    <p id="resultado"></p>

    <script>
        function mult(){
            let numero = document.getElementById("numero").value;

            numero = numero * 2;

            document.getElementById("resultado").innerHTML = "O resultado é: " + numero; //mostrar no documento
            console.log("resultado é: "+ numero); //mostrar no console aperte cltr+j
            window.alert("O resultado é: "+ numero); //mostrar no alerte do navegador 
        }

    </script>
    
</body>
</html>
